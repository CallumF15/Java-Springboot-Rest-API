spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Business Application
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/taskdb
    username: postgres
    password: taskpass
    properties:
      charSet: UTF-8
    hikari:
      minimumIdle: 2
      maximumPoolSize: 10
      idleTimeout: 10000
      poolName: "MyBusinessApplication"
      maxLifetime: 7200000
      connectionTimeout: 30000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update #tells Hibernate to automatically create missing tables/columns.
    properties:
        jdbc:
          lob:
            # silence the 'wall-of-text' - unnecessary exception throw about blob types
            non_contextual_creation: true




server:
  port: 4000
  shutdown: "graceful"



# If you want to use a database then uncomment the `group:, readiness: and include: "db"`
# lines in the health probes and uncomment the datasource section
management:
  endpoint:
    health:
      show-details: "always"
      # group:
      #  readiness:
      #   include: "db"
  endpoints:
    web:
      base-path: /
      exposure:
        include: info # should we have more?

springdoc:
  packagesToScan: com.company.business.controllers
  writer-with-order-by-keys: true

